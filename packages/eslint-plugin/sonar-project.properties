sonar.organization=javierbrea
sonar.projectKey=javierbrea_eslint-plugin-boundaries
sonar.projectVersion=6.0.0-beta.1

sonar.javascript.file.suffixes=.js
sonar.sourceEncoding=UTF-8
sonar.exclusions=node_modules/**
sonar.cpd.exclusions=test/**/*,src/**/*.spec.ts
sonar.coverage.exclusions=*.*,test/**/*,stryker.conf.js,resolver-legacy-alias/**/*,scripts/**/*,src/**/*.spec.ts
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.host.url=https://sonarcloud.io
sonar.branch.longLivedBranches.regex=release|(release-.*)
